body:
  text: 成王為城濮之行王使子文校子玉子文匜曳列師於一日而畢不肆一人子甲一玉匜曳列師出之蒍三日而畢斬三人舉邦賀子文以其善行師王歸客於子文子文甚喜甲二合邦以飲酒蒍伯嬴猶約幼須持舟飲酒飲子文子文舉貽伯嬴曰穀於菟為甲三楚邦老君王免余罪以子玉之未貫君王命余列師於一日而畢乙一不肆一人子玉出之蒍三日而畢斬三人王為余客舉邦賀余汝獨不余見食乙二是為天弃不思老人之心伯嬴曰君王謂子玉未貫甲四既敗師已君為楚邦老喜君之善而不制子玉之師之甲五命君校之君一日而不乙三上言乎君子哉問乙三下
  hash: sha256:e24b2b4b40810dcd33e1d7ea957b024c51f4935a35c8e0f439885eca42e78355
